<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>please woonyo 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF6B9D;
  --pink2: #FF8FB1;
  --pink3: #FFD6E5;
  --pink4: #FFF0F6;
  --coral: #FF8C69;
  --yellow: #FFD93D;
  --mint: #6BCFB8;
  --lavender: #C084FC;
  --text: #2D1B35;
  --text2: #7B5E7B;
  --text3: #B89AB8;
  --white: #FFFFFF;
  --shadow: 0 8px 32px rgba(255,107,157,0.15);
  --shadow2: 0 4px 16px rgba(255,107,157,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(135deg, #FFF0F6 0%, #FFF8F0 50%, #F0F8FF 100%);
  min-height: 100vh;
  color: var(--text);
}

/* ── LOGIN ── */
.login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #FFE4EE 0%, #FFF0E4 50%, #E4F0FF 100%);
  position: relative; overflow: hidden;
}
.login-screen::before {
  content: '💕'; font-size: 200px; position: absolute;
  top: -60px; right: -40px; opacity: 0.08; transform: rotate(15deg);
}
.login-screen::after {
  content: '🌸'; font-size: 150px; position: absolute;
  bottom: -40px; left: -30px; opacity: 0.08; transform: rotate(-10deg);
}
.login-card {
  background: white; border-radius: 32px;
  padding: 48px 40px; width: 90%; max-width: 400px;
  box-shadow: 0 24px 80px rgba(255,107,157,0.2);
  text-align: center; position: relative; z-index: 1;
  animation: floatIn 0.6s ease;
}
@keyframes floatIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
.login-heart { font-size: 56px; margin-bottom: 12px; animation: heartbeat 1.5s ease infinite; }
@keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.login-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 900; color: var(--pink);
  margin-bottom: 4px; letter-spacing: -0.5px;
}
.login-sub { font-size: 13px; color: var(--text3); margin-bottom: 32px; }
.google-btn {
  width: 100%; padding: 16px; border-radius: 16px;
  border: 2px solid var(--pink3);
  background: white; color: var(--text);
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.google-btn:hover {
  background: var(--pink4); border-color: var(--pink);
  transform: translateY(-2px); box-shadow: var(--shadow);
}
.google-icon { width: 20px; height: 20px; }
.login-note { font-size: 12px; color: var(--text3); margin-top: 20px; }

/* ── APP ── */
#app { display: none; }

/* ── NAV ── */
.top-nav {
  background: white; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 20px rgba(255,107,157,0.08);
  position: sticky; top: 0; z-index: 100;
}
.app-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 900; color: var(--pink);
}
.user-info { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; overflow: hidden;
}
.user-avatar img { width:100%; height:100%; object-fit:cover; }
.user-name { font-size: 13px; font-weight: 700; color: var(--text); }
.logout-btn {
  background: none; border: none; font-size: 12px;
  color: var(--text3); cursor: pointer; padding: 4px 8px;
  border-radius: 8px; transition: all 0.2s;
}
.logout-btn:hover { background: var(--pink4); color: var(--pink); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; padding: 8px 0 env(safe-area-inset-bottom);
  box-shadow: 0 -4px 24px rgba(255,107,157,0.1);
  display: flex; z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 8px 4px;
  border: none; background: none; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.nav-icon { font-size: 22px; transition: transform 0.2s; }
.nav-label { font-size: 10px; font-weight: 700; color: var(--text3); transition: color 0.2s; }
.nav-item.active .nav-icon { transform: scale(1.2); }
.nav-item.active .nav-label { color: var(--pink); }

/* ── MAIN ── */
main { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }

/* ── PAGES ── */
.page { display: none; animation: pageIn 0.3s ease; }
.page.active { display: block; }
@keyframes pageIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ── SECTION TITLE ── */
.section-label {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; margin-top: 24px;
}

/* ── CARDS ── */
.card {
  background: white; border-radius: 24px;
  padding: 20px; margin-bottom: 12px;
  box-shadow: var(--shadow2);
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

/* ── HERO ── */
.hero-card {
  background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
  border-radius: 28px; padding: 28px 24px; margin-bottom: 20px;
  color: white; position: relative; overflow: hidden;
}
.hero-card::after {
  content: '💕'; font-size: 80px; position: absolute;
  right: -10px; bottom: -20px; opacity: 0.2;
}
.hero-greeting { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
.hero-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; margin-bottom: 12px; }
.hero-stats { display: flex; gap: 20px; }
.hero-stat-val { font-size: 28px; font-weight: 900; line-height: 1; }
.hero-stat-label { font-size: 11px; opacity: 0.8; }

/* ── BUTTONS ── */
.btn {
  padding: 12px 24px; border-radius: 16px; border: none;
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.25s;
}
.btn-pink {
  background: linear-gradient(135deg, var(--pink), var(--pink2));
  color: white; box-shadow: 0 4px 16px rgba(255,107,157,0.4);
}
.btn-pink:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,157,0.4); }
.btn-outline {
  background: white; border: 2px solid var(--pink3); color: var(--pink);
}
.btn-outline:hover { background: var(--pink4); border-color: var(--pink); }
.btn-mint { background: linear-gradient(135deg, var(--mint), #4ECDC4); color: white; box-shadow: 0 4px 16px rgba(107,207,184,0.4); }
.btn-full { width: 100%; }
.btn-sm { padding: 7px 16px; font-size: 12px; border-radius: 10px; }

/* ── FORM ── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; background: var(--pink4); border: 2px solid transparent;
  color: var(--text); padding: 12px 16px; border-radius: 14px;
  font-size: 14px; font-family: inherit; outline: none; transition: all 0.2s;
}
.form-input:focus { border-color: var(--pink); background: white; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── THEME CHIPS ── */
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.theme-chip {
  padding: 10px 8px; border-radius: 14px; border: 2px solid var(--pink3);
  background: white; text-align: center; cursor: pointer; transition: all 0.2s;
  font-family: inherit;
}
.theme-chip .chip-icon { font-size: 20px; display: block; margin-bottom: 3px; }
.theme-chip .chip-label { font-size: 11px; font-weight: 700; color: var(--text2); }
.theme-chip.selected { border-color: var(--pink); background: var(--pink4); }
.theme-chip.selected .chip-label { color: var(--pink); }

/* ── LOCATION SELECTOR ── */
.region-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.region-chip {
  padding: 8px 16px; border-radius: 20px; border: 2px solid var(--pink3);
  background: white; font-size: 13px; font-weight: 700; color: var(--text2);
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.region-chip.selected { border-color: var(--pink); background: var(--pink); color: white; }
.region-chip:hover:not(.selected) { border-color: var(--pink2); color: var(--pink); }

/* ── CHECKLIST ── */
.checklist-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--pink4); border-radius: 12px;
  margin-bottom: 8px;
}
.check-box {
  width: 22px; height: 22px; border-radius: 8px; border: 2px solid var(--pink3);
  background: white; display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all 0.2s;
}
.check-box.checked { background: var(--pink); border-color: var(--pink); }
.check-box.checked::after { content: '✓'; color: white; font-size: 13px; font-weight: 900; }
.check-text { flex: 1; font-size: 13px; font-weight: 500; }
.check-text.checked { text-decoration: line-through; color: var(--text3); }
.star-btn {
  background: none; border: none; font-size: 16px; cursor: pointer;
  opacity: 0.3; transition: all 0.2s; padding: 2px;
}
.star-btn.starred { opacity: 1; }
.important-badge {
  font-size: 10px; font-weight: 700; color: var(--pink);
  background: var(--pink3); padding: 2px 8px; border-radius: 6px;
}

/* ── DATE REQUEST CARD ── */
.request-card {
  background: white; border-radius: 24px; padding: 20px;
  margin-bottom: 12px; box-shadow: var(--shadow2);
  border-left: 4px solid var(--pink);
}
.request-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.request-from { font-size: 12px; color: var(--text3); }
.request-theme { font-size: 22px; }
.request-date { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.request-place { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.request-actions { display: flex; gap: 8px; }
.status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
}
.status-pending { background: #FFF3CD; color: #856404; }
.status-accepted { background: #D1FAE5; color: #065F46; }
.status-rejected { background: #FFE4E6; color: #9F1239; }

/* ── DIARY ── */
.diary-card {
  background: white; border-radius: 24px; padding: 24px;
  margin-bottom: 12px; box-shadow: var(--shadow2);
  position: relative; overflow: hidden;
}
.diary-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--pink), var(--lavender));
}
.diary-date { font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 6px; }
.diary-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.diary-content { font-size: 13px; color: var(--text2); line-height: 1.7; }
.diary-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.diary-tag {
  padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700;
  background: var(--pink4); color: var(--pink);
}
.diary-rating { display: flex; gap: 2px; margin-top: 8px; font-size: 18px; }

/* ── PLACES ── */
.place-card {
  background: white; border-radius: 20px; padding: 16px 20px;
  margin-bottom: 10px; box-shadow: var(--shadow2);
  display: flex; align-items: center; gap: 14px;
}
.place-icon {
  width: 48px; height: 48px; border-radius: 16px;
  background: linear-gradient(135deg, var(--pink3), var(--lavender));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.place-info { flex: 1; }
.place-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
.place-region { font-size: 12px; color: var(--text3); }
.place-count {
  background: var(--pink4); color: var(--pink);
  padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 700;
}

/* ── REGION STATS ── */
.region-stat-card {
  background: white; border-radius: 20px; padding: 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; box-shadow: var(--shadow2);
}
.region-stat-name { font-weight: 700; font-size: 15px; }
.region-stat-bar-wrap { flex: 1; margin: 0 16px; }
.region-stat-bar { height: 8px; background: var(--pink3); border-radius: 4px; overflow: hidden; }
.region-stat-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--lavender)); border-radius: 4px; transition: width 0.8s ease; }
.region-stat-count { font-weight: 900; color: var(--pink); font-size: 18px; min-width: 24px; text-align: right; }

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(45,27,53,0.4); backdrop-filter: blur(4px);
  z-index: 300; align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: white; border-radius: 32px 32px 0 0;
  padding: 28px 24px 40px; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 40px; height: 4px; background: var(--pink3); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; margin-bottom: 20px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: white; padding: 12px 24px;
  border-radius: 20px; font-size: 13px; font-weight: 700;
  opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MISSION CARD ── */
.mission-card {
  background: linear-gradient(135deg, var(--yellow), var(--coral));
  border-radius: 24px; padding: 24px; text-align: center; color: white;
  position: relative; overflow: hidden;
}
.mission-card::after { content: '✨'; font-size: 60px; position: absolute; right: -10px; top: -10px; opacity: 0.3; }
.mission-icon { font-size: 40px; margin-bottom: 8px; }
.mission-text { font-size: 16px; font-weight: 700; line-height: 1.5; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 48px 24px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(--text3); font-weight: 500; }

textarea.form-input { resize: none; min-height: 100px; }
.flex-row { display: flex; gap: 8px; align-items: center; }
.star-rating { display: flex; gap: 4px; font-size: 24px; cursor: pointer; }
.add-check-row { display: flex; gap: 8px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-heart">💕</div>
    <div class="login-title">please woonyo</div>
    <div class="login-sub">우뇨야, 데이트를 받아줘! 🌸</div>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 시작하기
    </button>
    <div class="login-note">woonyo & old man 전용 💌</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-nav">
    <div class="app-title">please woonyo 💕</div>
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">👤</div>
      <div class="user-name" id="user-name">-</div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <main>
    <!-- 홈 -->
    <div id="page-home" class="page active">
      <div class="hero-card">
        <div class="hero-greeting" id="hero-greeting">안녕하세요 💕</div>
        <div class="hero-title">우리의 데이트 🌸</div>
        <div class="hero-stats">
          <div><div class="hero-stat-val" id="total-dates">0</div><div class="hero-stat-label">총 데이트</div></div>
          <div><div class="hero-stat-val" id="pending-count">0</div><div class="hero-stat-label">대기중</div></div>
          <div><div class="hero-stat-val" id="diary-count">0</div><div class="hero-stat-label">일기</div></div>
        </div>
      </div>

      <!-- 대기중 신청 -->
      <div class="section-label">💌 받은 데이트 신청</div>
      <div id="incoming-requests">
        <div class="empty-state"><div class="empty-icon">💌</div><div class="empty-text">받은 신청이 없어요</div></div>
      </div>

      <!-- 다가오는 데이트 -->
      <div class="section-label">📅 다가오는 데이트</div>
      <div id="upcoming-dates">
        <div class="empty-state"><div class="empty-icon">🌸</div><div class="empty-text">예정된 데이트가 없어요</div></div>
      </div>
    </div>

    <!-- 신청 -->
    <div id="page-apply" class="page">
      <div class="section-label" style="margin-top:0;">💌 데이트 신청하기</div>
      <div class="card">
        <!-- 날짜/시간 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">📅 날짜</label>
            <input type="date" id="a-date" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">⏰ 시간</label>
            <input type="time" id="a-time" class="form-input" value="14:00">
          </div>
        </div>

        <!-- 테마 -->
        <div class="form-group">
          <label class="form-label">🎨 데이트 테마</label>
          <div class="theme-grid" id="theme-grid">
            <button class="theme-chip" data-theme="로맨틱" onclick="selectTheme(this)"><span class="chip-icon">🌹</span><span class="chip-label">로맨틱</span></button>
            <button class="theme-chip" data-theme="맛집탐방" onclick="selectTheme(this)"><span class="chip-icon">🍽️</span><span class="chip-label">맛집탐방</span></button>
            <button class="theme-chip" data-theme="액티비티" onclick="selectTheme(this)"><span class="chip-icon">🎯</span><span class="chip-label">액티비티</span></button>
            <button class="theme-chip" data-theme="힐링" onclick="selectTheme(this)"><span class="chip-icon">🌿</span><span class="chip-label">힐링</span></button>
            <button class="theme-chip" data-theme="문화생활" onclick="selectTheme(this)"><span class="chip-icon">🎬</span><span class="chip-label">문화생활</span></button>
            <button class="theme-chip" data-theme="드라이브" onclick="selectTheme(this)"><span class="chip-icon">🚗</span><span class="chip-label">드라이브</span></button>
          </div>
        </div>

        <!-- 지역 -->
        <div class="form-group">
          <label class="form-label">📍 지역 선택</label>
          <div class="region-grid" id="region-main-grid">
            <button class="region-chip" onclick="selectRegion(this,'대구')">대구</button>
            <button class="region-chip" onclick="selectRegion(this,'서울')">서울</button>
            <button class="region-chip" onclick="selectRegion(this,'부산')">부산</button>
            <button class="region-chip" onclick="selectRegion(this,'경주')">경주</button>
            <button class="region-chip" onclick="selectRegion(this,'제주')">제주</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBamsaFwG14Va2PAAUDuZw1qZpF7YzB68U",
  authDomain: "please-woonyo.firebaseapp.com",
  projectId: "please-woonyo",
  storageBucket: "please-woonyo.firebasestorage.app",
  messagingSenderId: "496203806109",
  appId: "1:496203806109:web:da7dfb296ad090956d6b74",
  measurementId: "G-0P9SJ6SV3Y"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

// ALLOWED USERS
const ALLOWED = ['woonyo', 'old man'];
const DISPLAY_NAMES = { 'woonyo': 'woonyo 🌸', 'old man': 'old man 🐻' };

let currentUser = null;
let checklistItems = [];
let selectedTheme = '';
let selectedRegion = '';
let selectedPlaceRegion = '';
let diaryStar = 5;

// ── AUTH ──────────────────────────────────────
window.loginWithGoogle = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    const email = result.user.email;
    // 허용된 사용자 체크 (이메일 기반으로 확인)
    currentUser = result.user;
    showToast('로그인 완료! 💕');
  } catch(e) {
    showToast('로그인 실패: ' + e.message, true);
  }
};

window.doLogout = async () => {
  await signOut(auth);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  currentUser = null;
};

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const name = user.displayName || user.email;
    document.getElementById('user-name').textContent = name;
    if (user.photoURL) {
      document.getElementById('user-avatar').innerHTML = `<img src="${user.photoURL}">`;
    }
    document.getElementById('hero-greeting').textContent = `안녕해요, ${name}! 💕`;
    loadAll();
  }
});

// ── DATA ──────────────────────────────────────
async function loadAll() {
  loadRequests();
  loadPlaces();
  loadDiaries();
}

// 데이트 신청
async function loadRequests() {
  const q = query(collection(db, 'requests'), orderBy('createdAt','desc'));
  onSnapshot(q, snap => {
    const all = snap.docs.map(d => ({id:d.id, ...d.data()}));
    renderHome(all);
  });
}

async function loadPlaces() {
  const q = query(collection(db,'places'), orderBy('createdAt','desc'));
  onSnapshot(q, snap => {
    const all = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderPlaces(all);
  });
}

async function loadDiaries() {
  const q = query(collection(db,'diaries'), orderBy('date','desc'));
  onSnapshot(q, snap => {
    const all = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderDiaries(all);
    document.getElementById('diary-count').textContent = all.length;
  });
}

// ── RENDER HOME ───────────────────────────────
function renderHome(requests) {
  const pending  = requests.filter(r => r.status === '대기');
  const accepted = requests.filter(r => r.status === '수락');
  document.getElementById('pending-count').textContent = pending.length;
  document.getElementById('total-dates').textContent = accepted.length;

  // 받은 신청
  const inEl = document.getElementById('incoming-requests');
  const myPending = pending.filter(r => r.toUser !== currentUser?.displayName && currentUser);
  if (pending.length === 0) {
    inEl.innerHTML = `<div class="empty-state"><div class="empty-icon">💌</div><div class="empty-text">받은 신청이 없어요</div></div>`;
  } else {
    inEl.innerHTML = pending.map(r => `
      <div class="request-card">
        <div class="request-header">
          <div>
            <div class="request-from">💌 ${r.fromName}의 신청</div>
            <div class="request-date">${r.date} ${r.time}</div>
            <div class="request-place">📍 ${r.region} / ${r.subLocation || '-'} &nbsp; ${getThemeIcon(r.theme)} ${r.theme}</div>
          </div>
          <span class="status-badge status-pending">대기중</span>
        </div>
        ${r.message ? `<div style="font-size:13px;color:var(--text2);margin-bottom:12px;font-style:italic;">"${r.message}"</div>` : ''}
        ${r.checklist?.length ? `<div style="margin-bottom:12px;">${r.checklist.map(c=>`<div style="font-size:12px;color:var(--text2);margin-bottom:3px;">${c.important?'⭐ ':'✓ '}${c.text}</div>`).join('')}</div>` : ''}
        ${r.mission ? `<div style="font-size:12px;background:var(--pink4);padding:8px 12px;border-radius:10px;margin-bottom:12px;">🎲 미션: ${r.mission}</div>` : ''}
        <div class="request-actions">
          <button class="btn btn-mint btn-sm" onclick="respondRequest('${r.id}','수락')">💕 수락</button>
          <button class="btn btn-outline btn-sm" onclick="respondRequest('${r.id}','거절')">거절</button>
        </div>
      </div>`).join('');
  }

  // 다가오는 데이트
  const upEl = document.getElementById('upcoming-dates');
  const today = new Date().toISOString().split('T')[0];
  const upcoming = accepted.filter(r => r.date >= today).sort((a,b)=>a.date.localeCompare(b.date));
  if (!upcoming.length) {
    upEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🌸</div><div class="empty-text">예정된 데이트가 없어요</div></div>`;
  } else {
    upEl.innerHTML = upcoming.map(r => `
      <div class="card" style="border-left:4px solid var(--mint);">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:12px;color:var(--text3);">${getThemeIcon(r.theme)} ${r.theme}</div>
            <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;">${r.date} ${r.time}</div>
            <div style="font-size:13px;color:var(--text2);">📍 ${r.region} / ${r.subLocation||'-'}</div>
          </div>
          <span class="status-badge status-accepted">수락됨 💕</span>
        </div>
        ${r.checklist?.length ? `
          <div style="margin-top:12px;">
            ${r.checklist.map((c,i)=>`
              <div class="checklist-item" style="cursor:pointer;" onclick="toggleCheck('${r.id}',${i})">
                <div class="check-box ${c.done?'checked':''}"></div>
                <span class="check-text ${c.done?'checked':''}">${c.important?'⭐ ':''}${c.text}</span>
              </div>`).join('')}
          </div>` : ''}
      </div>`).join('');
  }
}

// ── RENDER PLACES ─────────────────────────────
function renderPlaces(places) {
  // 지역별 카운팅
  const regionCount = {};
  places.filter(p=>p.category==='가봤던곳').forEach(p => {
    regionCount[p.region] = (regionCount[p.region]||0) + 1;
  });
  const maxCount = Math.max(1, ...Object.values(regionCount));
  const statsEl = document.getElementById('region-stats');
  if (!Object.keys(regionCount).length) {
    statsEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-text">아직 기록된 장소가 없어요</div></div>`;
  } else {
    statsEl.innerHTML = Object.entries(regionCount).sort((a,b)=>b[1]-a[1]).map(([region,cnt])=>`
      <div class="region-stat-card">
        <div class="region-stat-name">📍 ${region}</div>
        <div class="region-stat-bar-wrap">
          <div class="region-stat-bar"><div class="region-stat-fill" style="width:${(cnt/maxCount*100)}%;"></div></div>
        </div>
        <div class="region-stat-count">${cnt}</div>
      </div>`).join('');
  }

  // 장소 목록
  const listEl = document.getElementById('places-list');
  if (!places.length) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📍</div><div class="empty-text">장소를 추가해봐요!</div></div>`;
  } else {
    const wanna  = places.filter(p=>p.category==='가고싶은곳');
    const visited= places.filter(p=>p.category==='가봤던곳');
    let html = '';
    if (visited.length) {
      html += `<div class="section-label">✅ 가봤던 곳 (${visited.length})</div>`;
      html += visited.map(p=>`
        <div class="place-card">
          <div class="place-icon">📍</div>
          <div class="place-info">
            <div class="place-name">${p.name}</div>
            <div class="place-region">${p.region} ${p.memo?'· '+p.memo:''}</div>
          </div>
          <button onclick="deletePlace('${p.id}')" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);">🗑️</button>
        </div>`).join('');
    }
    if (wanna.length) {
      html += `<div class="section-label">🌟 가고싶은 곳 (${wanna.length})</div>`;
      html += wanna.map(p=>`
        <div class="place-card">
          <div class="place-icon" style="background:linear-gradient(135deg,var(--yellow),var(--coral));">🌟</div>
          <div class="place-info">
            <div class="place-name">${p.name}</div>
            <div class="place-region">${p.region} ${p.memo?'· '+p.memo:''}</div>
          </div>
          <button onclick="deletePlace('${p.id}')" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);">🗑️</button>
        </div>`).join('');
    }
    listEl.innerHTML = html;
  }
}

// ── RENDER DIARIES ────────────────────────────
function renderDiaries(diaries) {
  const el = document.getElementById('diary-list');
  if (!diaries.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📔</div><div class="empty-text">첫 데이트 일기를 써봐요!</div></div>`;
    return;
  }
  el.innerHTML = diaries.map(d=>`
    <div class="diary-card">
      <div class="diary-date">${d.date} · ${d.author||''}</div>
      <div class="diary-title">${d.title}</div>
      <div class="diary-content">${d.content}</div>
      <div class="diary-rating">${'⭐'.repeat(d.star||5)}</div>
      ${d.tags?.length ? `<div class="diary-tags">${d.tags.map(t=>`<span class="diary-tag">#${t.trim()}</span>`).join('')}</div>` : ''}
    </div>`).join('');
}

// ── ACTIONS ───────────────────────────────────
window.submitDateRequest = async () => {
  const date = document.getElementById('a-date').value;
  const time = document.getElementById('a-time').value;
  if (!date || !selectedTheme || !selectedRegion) {
    showToast('날짜, 테마, 지역을 선택해주세요!', true); return;
  }
  try {
    await addDoc(collection(db,'requests'), {
      fromName: currentUser.displayName || currentUser.email,
      date, time,
      theme: selectedTheme,
      region: selectedRegion,
      subLocation: document.getElementById('a-subloc').value,
      checklist: checklistItems.map(c=>({...c})),
      mission: document.getElementById('mission-display').dataset.mission||'',
      message: document.getElementById('a-message').value,
      status: '대기',
      createdAt: serverTimestamp()
    });
    showToast('데이트 신청 완료! 💕');
    // 초기화
    checklistItems = [];
    renderChecklistItems();
    selectedTheme = ''; selectedRegion = '';
    document.querySelectorAll('.theme-chip').forEach(c=>c.classList.remove('selected'));
    document.querySelectorAll('#region-main-grid .region-chip').forEach(c=>c.classList.remove('selected'));
    document.getElementById('a-date').value='';
    document.getElementById('a-subloc').value='';
    document.getElementById('a-message').value='';
    document.getElementById('mission-display').innerHTML='';
    showPage('home', document.querySelector('.nav-item'));
  } catch(e) { showToast('오류: '+e.message, true); }
};

window.respondRequest = async (id, status) => {
  await updateDoc(doc(db,'requests',id), { status });
  showToast(status==='수락' ? '수락했어요! 💕' : '거절했어요');
};

window.toggleCheck = async (reqId, idx) => {
  // 로컬에서 먼저 가져와서 업데이트
  const snap = await getDocs(collection(db,'requests'));
  const docData = snap.docs.find(d=>d.id===reqId);
  if (!docData) return;
  const checklist = docData.data().checklist || [];
  checklist[idx].done = !checklist[idx].done;
  await updateDoc(doc(db,'requests',reqId), { checklist });
};

window.savePlace = async () => {
  const name = document.getElementById('p-name').value.trim();
  if (!name || !selectedPlaceRegion) { showToast('지역과 장소명을 입력해주세요!', true); return; }
  await addDoc(collection(db,'places'), {
    name,
    region: selectedPlaceRegion,
    memo: document.getElementById('p-memo').value,
    category: document.getElementById('p-cat').value,
    createdAt: serverTimestamp()
  });
  closeModal('modal-place');
  document.getElementById('p-name').value='';
  document.getElementById('p-memo').value='';
  selectedPlaceRegion='';
  document.querySelectorAll('#place-region-grid .region-chip').forEach(c=>c.classList.remove('selected'));
  showToast('장소 저장! 📍');
};

window.deletePlace = async (id) => {
  if (!confirm('삭제할까요?')) return;
  await deleteDoc(doc(db,'places',id));
  showToast('삭제됐어요');
};

window.saveDiary = async () => {
  const title = document.getElementById('d-title').value.trim();
  const content = document.getElementById('d-content').value.trim();
  const date = document.getElementById('d-date').value;
  if (!title || !content || !date) { showToast('날짜, 제목, 내용을 입력해주세요!', true); return; }
  const tags = document.getElementById('d-tags').value.split(',').filter(t=>t.trim());
  await addDoc(collection(db,'diaries'), {
    title, content, date,
    star: diaryStar,
    tags,
    author: currentUser.displayName || currentUser.email,
    createdAt: serverTimestamp()
  });
  closeModal('modal-diary');
  document.getElementById('d-title').value='';
  document.getElementById('d-content').value='';
  document.getElementById('d-tags').value='';
  diaryStar=5; updateDiaryStars();
  showToast('일기 저장 완료! 📔');
};

// ── UI HELPERS ────────────────────────────────
window.selectTheme = (el) => {
  document.querySelectorAll('.theme-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedTheme = el.dataset.theme;
};

window.selectRegion = (el, region) => {
  document.querySelectorAll('#region-main-grid .region-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedRegion = region;
};

window.selectPlaceRegion = (el, region) => {
  document.querySelectorAll('#place-region-grid .region-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedPlaceRegion = region;
};

window.addCheckItem = () => {
  const input = document.getElementById('new-check-input');
  const text = input.value.trim();
  if (!text) return;
  if (checklistItems.length >= 10) { showToast('최대 10개까지 가능해요!', true); return; }
  checklistItems.push({ text, important: false, done: false });
  input.value = '';
  renderChecklistItems();
};

function renderChecklistItems() {
  const starredCount = checklistItems.filter(c=>c.important).length;
  document.getElementById('checklist-items').innerHTML = checklistItems.map((c,i)=>`
    <div class="checklist-item">
      <span class="check-text" style="${c.important?'font-weight:700;color:var(--pink);':''}">${c.text}</span>
      ${c.important ? '<span class="important-badge">⭐ 중요</span>' : ''}
      <button class="star-btn ${c.important?'starred':''}" onclick="toggleImportant(${i})" title="중요 표시">${c.important?'⭐':'☆'}</button>
      <button onclick="removeCheck(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;">×</button>
    </div>`).join('');
}

window.toggleImportant = (idx) => {
  const starredCount = checklistItems.filter(c=>c.important).length;
  if (!checklistItems[idx].important && starredCount >= 3) {
    showToast('중요 표시는 최대 3개까지!', true); return;
  }
  checklistItems[idx].important = !checklistItems[idx].important;
  renderChecklistItems();
};

window.removeCheck = (idx) => {
  checklistItems.splice(idx,1);
  renderChecklistItems();
};

  '서로에게 몰래 편지 써오기 💌',

  '오늘 하루 상대방이 모든 것 결정하기 👑',
  '길에서 만나는 첫 번째 카페 들어가기 ☕',
  '서로 어릴 적 사진 보여주기 👶',
  '오늘 기억에 남는 장면 사진 3장 찍기 📸',
  '서로 모르는 음식 하나씩 주문해주기 🍽️',
  '오늘 데이트 BGM 서로 한 곡씩 추천하기 🎵',
  '길거리 포토부스 찍기 🎞️',
  '서로에게 칭찬 5가지씩 하기 💕',
];

window.drawMission = () => {
  const mission = MISSIONS[Math.floor(Math.random()*MISSIONS.length)];
  const el = document.getElementById('mission-display');
  el.dataset.mission = mission;
  el.innerHTML = `<div class="mission-card"><div class="mission-icon">🎲</div><div class="mission-text">${mission}</div></div>`;
};

window.setDiaryStar = (n) => { diaryStar=n; updateDiaryStars(); };
function updateDiaryStars() {
  const stars = document.querySelectorAll('#diary-stars span');
  stars.forEach((s,i) => { s.textContent = i < diaryStar ? '⭐' : '☆'; });
}

function getThemeIcon(theme) {
  const map = {'로맨틱':'🌹','맛집탐방':'🍽️','액티비티':'🎯','힐링':'🌿','문화생활':'🎬','드라이브':'🚗'};
  return map[theme]||'💕';
}

window.openAddPlace = () => document.getElementById('modal-place').classList.add('open');
window.openAddDiary = () => {
  document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal-diary').classList.add('open');
};
window.closeModal = (id) => document.getElementById(id).classList.remove('open');

window.showPage = (id, el) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el) el.classList.add('active');
};

window.showToast = (msg, isErr=false) => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#FF6B6B' : 'var(--text)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
};

// 날짜 기본값
document.getElementById('a-date').value = new Date().toISOString().split('T')[0];
document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
</script>
