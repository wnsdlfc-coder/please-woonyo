<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>please woonyo</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #E8748A;
  --rose2: #F4A0B0;
  --rose3: #FADADD;
  --rose4: #FFF5F6;
  --cream: #FDF8F0;
  --peach: #F9E4D4;
  --sage: #B5C9B7;
  --text: #3D2C2C;
  --text2: #7A5C5C;
  --text3: #B89898;
  --white: #FFFFFF;
  --shadow: 0 4px 24px rgba(232,116,138,0.12);
  --shadow2: 0 2px 12px rgba(232,116,138,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  color: var(--text);
  font-size: 15px;
}

/* ── LOGIN ── */
.login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #FFF0F2 0%, #FDF8F0 60%, #F0F4FF 100%);
}
.login-card {
  background: white;
  border-radius: 28px;
  padding: 52px 40px;
  width: 90%; max-width: 380px;
  box-shadow: 0 20px 60px rgba(232,116,138,0.15);
  text-align: center;
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.login-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 30px; font-weight: 800;
  color: var(--rose); margin-bottom: 6px; letter-spacing: -0.5px;
}
.login-sub { font-size: 14px; color: var(--text3); margin-bottom: 36px; line-height: 1.6; }
.google-btn {
  width: 100%; padding: 16px;
  border-radius: 14px; border: 1.5px solid var(--rose3);
  background: white; color: var(--text);
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.25s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 12px;
}
.google-btn:hover { background: var(--rose4); border-color: var(--rose); transform: translateY(-1px); box-shadow: var(--shadow); }
.login-note { font-size: 13px; color: var(--text3); margin-top: 16px; }

/* ── NICKNAME SETUP ── */
.nickname-screen {
  min-height: 100vh;
  display: none; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #FFF0F2 0%, #FDF8F0 60%, #F0F4FF 100%);
}
.nickname-card {
  background: white; border-radius: 28px; padding: 48px 36px;
  width: 90%; max-width: 380px;
  box-shadow: 0 20px 60px rgba(232,116,138,0.15);
  text-align: center;
}
.nickname-title { font-family:'Nanum Myeongjo',serif; font-size:24px; font-weight:800; color:var(--rose); margin-bottom:8px; }
.nickname-sub { font-size:14px; color:var(--text3); margin-bottom:28px; line-height:1.6; }

/* ── APP ── */
#app { display: none; }

/* ── TOP NAV ── */
.top-nav {
  background: white; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 1px 12px rgba(0,0,0,0.06);
  position: sticky; top: 0; z-index: 100;
}
.app-title { font-family:'Nanum Myeongjo',serif; font-size:19px; font-weight:800; color:var(--rose); }
.user-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--rose4); border-radius: 20px; padding: 6px 14px;
}
.user-dot { width:8px; height:8px; border-radius:50%; background:var(--rose); }
.user-chip-name { font-size:13px; font-weight:700; color:var(--text2); }
.logout-btn { background:none; border:none; font-size:12px; color:var(--text3); cursor:pointer; margin-left:6px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; padding: 10px 0 env(safe-area-inset-bottom);
  box-shadow: 0 -1px 16px rgba(0,0,0,0.07);
  display: flex; z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px; padding: 6px 4px;
  border: none; background: none; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 11px; font-weight: 700; color: var(--text3); transition: color 0.2s; }
.nav-item.active .nav-label { color: var(--rose); }
.nav-active-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--rose); margin: 0 auto; opacity: 0; transition: opacity 0.2s; }
.nav-item.active .nav-active-dot { opacity: 1; }

/* ── MAIN ── */
main { max-width: 480px; margin: 0 auto; padding: 20px 16px 90px; }

/* ── PAGES ── */
.page { display: none; animation: fadeUp 0.25s ease; }
.page.active { display: block; }

/* ── PAGE TITLE ── */
.page-title { font-family:'Nanum Myeongjo',serif; font-size:22px; font-weight:800; color:var(--text); margin-bottom:20px; }
.section-label { font-size:12px; font-weight:700; color:var(--text3); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:10px; margin-top:24px; }

/* ── CARDS ── */
.card {
  background: white; border-radius: 20px;
  padding: 20px; margin-bottom: 12px;
  box-shadow: var(--shadow2);
}

/* ── FORM ── */
.form-group { margin-bottom: 18px; }
.form-label { font-size:13px; font-weight:700; color:var(--text2); margin-bottom:7px; display:block; }
.form-input {
  width: 100%; background: var(--rose4);
  border: 1.5px solid transparent; color: var(--text);
  padding: 12px 16px; border-radius: 12px;
  font-size: 15px; font-family: inherit; outline: none; transition: all 0.2s;
}
.form-input:focus { border-color: var(--rose); background: white; }
textarea.form-input { resize: none; min-height: 90px; line-height: 1.6; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── BUTTONS ── */
.btn {
  padding: 13px 24px; border-radius: 14px; border: none;
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.25s;
}
.btn-rose { background: var(--rose); color: white; box-shadow: 0 4px 16px rgba(232,116,138,0.3); }
.btn-rose:hover { background: #D4637A; transform: translateY(-1px); }
.btn-outline { background: white; border: 1.5px solid var(--rose3); color: var(--rose); }
.btn-outline:hover { background: var(--rose4); border-color: var(--rose); }
.btn-sage { background: var(--sage); color: white; }
.btn-full { width: 100%; }
.btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 10px; }
.btn-xs { padding: 5px 10px; font-size: 12px; border-radius: 8px; }

/* ── RECIPIENT SELECTOR ── */
.recipient-grid { display: flex; gap: 10px; margin-bottom: 4px; }
.recipient-chip {
  flex: 1; padding: 14px 10px; border-radius: 14px;
  border: 1.5px solid var(--rose3); background: white;
  text-align: center; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.recipient-chip .r-name { font-size: 15px; font-weight: 700; color: var(--text2); }
.recipient-chip .r-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
.recipient-chip.selected { border-color: var(--rose); background: var(--rose4); }
.recipient-chip.selected .r-name { color: var(--rose); }

/* ── THEME CHIPS ── */
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.theme-chip {
  padding: 12px 8px; border-radius: 12px; border: 1.5px solid var(--rose3);
  background: white; text-align: center; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.theme-chip .chip-label { font-size: 13px; font-weight: 700; color: var(--text2); }
.theme-chip.selected { border-color: var(--rose); background: var(--rose4); }
.theme-chip.selected .chip-label { color: var(--rose); }

/* ── REGION ── */
.region-wrap { position: relative; }
.region-select-btn {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  border: 1.5px solid transparent; background: var(--rose4);
  color: var(--text); font-size: 15px; font-family: inherit;
  text-align: left; cursor: pointer; transition: all 0.2s;
  display: flex; justify-content: space-between; align-items: center;
}
.region-select-btn:hover, .region-select-btn.open { border-color: var(--rose); background: white; }
.region-dropdown {
  display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: white; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  z-index: 50; max-height: 260px; overflow-y: auto; padding: 8px;
}
.region-dropdown.open { display: block; }
.region-group-title { font-size: 11px; font-weight: 700; color: var(--text3); padding: 8px 10px 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.region-option {
  padding: 10px 14px; border-radius: 10px; cursor: pointer;
  font-size: 14px; color: var(--text); transition: background 0.15s;
}
.region-option:hover { background: var(--rose4); }
.region-option.selected { background: var(--rose4); color: var(--rose); font-weight: 700; }

/* ── CHECKLIST ── */
.checklist-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--rose4); border-radius: 12px; margin-bottom: 8px;
}
.check-text { flex: 1; font-size: 14px; }
.check-text.important { font-weight: 700; color: var(--rose); }
.star-btn { background: none; border: none; font-size: 15px; cursor: pointer; color: var(--text3); transition: color 0.2s; }
.star-btn.on { color: #F4A300; }
.del-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text3); }
.add-row { display: flex; gap: 8px; }

/* ── MISSION ── */
.mission-box {
  background: linear-gradient(135deg, #FFF0D4, #FFE4E8);
  border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 8px;
}
.mission-box-text { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.6; }

/* ── REQUEST CARD ── */
.req-card {
  background: white; border-radius: 20px; padding: 20px;
  margin-bottom: 12px; box-shadow: var(--shadow2);
  border-left: 3px solid var(--rose);
}
.req-from { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
.req-date-big { font-family:'Nanum Myeongjo',serif; font-size:18px; font-weight:700; margin-bottom:3px; }
.req-info { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.req-actions { display: flex; gap: 8px; }
.status-badge {
  display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
}
.s-pending  { background: #FEF3C7; color: #92400E; }
.s-accepted { background: #D1FAE5; color: #065F46; }
.s-rejected { background: #FFE4E6; color: #9F1239; }

/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, var(--rose) 0%, #C86B85 100%);
  border-radius: 24px; padding: 28px 24px; margin-bottom: 20px; color: white;
}
.hero-greeting { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
.hero-name { font-family:'Nanum Myeongjo',serif; font-size:26px; font-weight:800; margin-bottom:16px; }
.hero-stats { display: flex; gap: 20px; }
.h-val { font-family:'Nanum Myeongjo',serif; font-size:30px; font-weight:800; line-height:1; }
.h-label { font-size: 12px; opacity: 0.8; margin-top: 2px; }

/* ── MY PAGE ── */
.tab-nav { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px; }
.tab-btn {
  padding: 8px 18px; border-radius: 20px; border: 1.5px solid var(--rose3);
  background: white; color: var(--text2); font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: inherit;
}
.tab-btn.active { background: var(--rose); color: white; border-color: var(--rose); }

/* ── DATE LIST ── */
.date-card {
  background: white; border-radius: 20px; padding: 20px;
  margin-bottom: 10px; box-shadow: var(--shadow2);
}
.date-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.date-card-date { font-family:'Nanum Myeongjo',serif; font-size:17px; font-weight:700; }
.date-card-info { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
.checklist-mini { margin-bottom: 10px; }
.checklist-mini-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; background: var(--rose4); border-radius: 8px; margin-bottom: 6px;
  cursor: pointer;
}
.mini-check { width:18px; height:18px; border-radius:6px; border:1.5px solid var(--rose3); background:white; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; }
.mini-check.done { background:var(--rose); border-color:var(--rose); color:white; }
.mini-text { font-size:13px; flex:1; }
.mini-text.done { text-decoration:line-through; color:var(--text3); }
.important-star { font-size: 12px; color: #F4A300; }

/* ── DIARY ── */
.diary-card {
  background: white; border-radius: 20px; padding: 22px;
  margin-bottom: 10px; box-shadow: var(--shadow2);
  position: relative; overflow: hidden;
}
.diary-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--rose),var(--rose2)); }
.diary-date-label { font-size:12px; color:var(--text3); margin-bottom:5px; }
.diary-title { font-family:'Nanum Myeongjo',serif; font-size:18px; font-weight:700; margin-bottom:8px; }
.diary-body { font-size:14px; color:var(--text2); line-height:1.7; }
.diary-stars { font-size:15px; margin-top:8px; }
.diary-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.diary-tag { padding:2px 10px; border-radius:10px; font-size:12px; background:var(--rose4); color:var(--rose); font-weight:700; }

/* ── PLACES ── */
.place-item {
  background: white; border-radius: 16px; padding: 16px 18px;
  margin-bottom: 8px; box-shadow: var(--shadow2);
  display: flex; align-items: center; gap: 14px;
}
.place-dot { width:10px; height:10px; border-radius:50%; background:var(--rose); flex-shrink:0; }
.place-name-big { font-size:15px; font-weight:700; }
.place-region-label { font-size:12px; color:var(--text3); }
.region-count-badge { background:var(--rose4); color:var(--rose); font-size:12px; font-weight:700; padding:3px 10px; border-radius:10px; margin-left:auto; white-space:nowrap; }

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(61,44,44,0.35); backdrop-filter: blur(3px);
  z-index: 300; align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: white; border-radius: 28px 28px 0 0;
  padding: 24px 22px 40px; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-bar { width:36px; height:4px; background:var(--rose3); border-radius:2px; margin:0 auto 20px; }
.modal-title { font-family:'Nanum Myeongjo',serif; font-size:20px; font-weight:800; margin-bottom:20px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--text); color: white; padding: 12px 24px;
  border-radius: 20px; font-size: 14px; font-weight: 700;
  opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.empty-state { text-align:center; padding:40px 20px; color:var(--text3); font-size:14px; line-height:2; }
.divider { height:1px; background:var(--rose3); margin:16px 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#FFF0F2 0%,#FDF8F0 60%,#F0F4FF 100%);">
  <div class="login-card">
    <div class="login-title">please woonyo</div>
    <div class="login-sub">우뇨야, 데이트를 받아줘<br>우리만의 공간이에요</div>
    <button class="google-btn" id="google-login-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 로그인
    </button>
    <div id="login-error" style="font-size:13px;color:#C0392B;margin-top:10px;min-height:18px;"></div>
    <div class="login-note">커플 전용 데이트 앱</div>
  </div>
</div>

<!-- NICKNAME SETUP -->
<div id="nickname-screen" class="nickname-screen">
  <div class="nickname-card">
    <div class="nickname-title">닉네임 설정</div>
    <div class="nickname-sub">앱에서 사용할 이름을 입력해주세요<br>상대방이 신청할 때 이 이름으로 보여요</div>
    <div class="form-group" style="text-align:left;">
      <label class="form-label">닉네임</label>
      <input type="text" id="nickname-input" class="form-input" placeholder="예) 우뇨, 올드맨, 준일..." maxlength="10" onkeydown="if(event.key==='Enter')saveNickname()">
      <div style="font-size:12px;color:var(--text3);margin-top:5px;">최대 10자, 나중에 변경 불가</div>
    </div>
    <button class="btn btn-rose btn-full" onclick="saveNickname()">시작하기</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-nav">
    <div class="app-title">please woonyo</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="user-chip">
        <div class="user-dot"></div>
        <div class="user-chip-name" id="user-name-display">-</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">나가기</button>
    </div>
  </div>

  <main>
    <!-- 홈 -->
    <div id="page-home" class="page active">
      <div class="hero">
        <div class="hero-greeting" id="hero-greeting">안녕하세요</div>
        <div class="hero-name" id="hero-name">-</div>
        <div class="hero-stats">
          <div><div class="h-val" id="stat-total">0</div><div class="h-label">함께한 데이트</div></div>
          <div><div class="h-val" id="stat-pending">0</div><div class="h-label">대기중인 신청</div></div>
          <div><div class="h-val" id="stat-diary">0</div><div class="h-label">일기</div></div>
        </div>
      </div>

      <div class="section-label">받은 신청</div>
      <div id="home-incoming"></div>

      <div class="section-label">다가오는 데이트</div>
      <div id="home-upcoming"></div>
    </div>

    <!-- 신청 -->
    <div id="page-apply" class="page">
      <div class="page-title">데이트 신청</div>
      <div class="card">
        <!-- 받는 사람 -->
        <div class="form-group">
          <label class="form-label">누구에게 신청할까요?</label>
          <input type="text" id="a-recipient" class="form-input" placeholder="상대방 닉네임을 입력하세요">
          <div style="font-size:12px;color:var(--text3);margin-top:5px;">상대방이 앱에서 설정한 닉네임을 입력해주세요</div>
        </div>

        <!-- 날짜/시간 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">날짜</label>
            <input type="date" id="a-date" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">시간</label>
            <input type="time" id="a-time" class="form-input" value="14:00">
          </div>
        </div>

        <!-- 테마 -->
        <div class="form-group">
          <label class="form-label">데이트 테마</label>
          <div class="theme-grid">

function buildRegionDropdown(dropdownId, btnId, btnTextId, onSelect) {
  const dd = document.getElementById(dropdownId);
  let html = '';
  Object.entries(REGIONS).forEach(([group, cities]) => {
    html += `<div class="region-group-title">${group}</div>`;
    cities.forEach(city => {
      html += `<div class="region-option" data-city="${city}" onclick="${onSelect}('${city}')">${city}</div>`;
    });
  });
  dd.innerHTML = html;
}

  const dd = document.getElementById('region-dropdown');
  const btn = document.getElementById('region-btn');
  dd.classList.toggle('open');
  btn.classList.toggle('open');
  document.addEventListener('click', closeRegionOutside, {once:true});
};
function closeRegionOutside(e) {
  if (!e.target.closest('.region-wrap')) {
    document.getElementById('region-dropdown').classList.remove('open');
    document.getElementById('region-btn').classList.remove('open');
  }
}
window.selectRegionOption = (city) => {
  selectedRegion = city;
  document.getElementById('region-btn-text').textContent = city;
  document.getElementById('region-dropdown').classList.remove('open');
  document.getElementById('region-btn').classList.remove('open');
  document.querySelectorAll('#region-dropdown .region-option').forEach(o => {
    o.classList.toggle('selected', o.dataset.city === city);
  });
};

window.togglePlaceRegionDropdown = () => {
  const dd = document.getElementById('place-region-dropdown');

};

    document.getElementById('google-login-btn').innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google로 로그인`;

    currentUser = user;

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return '좋은 아침이에요';
  if (h < 18) return '즐거운 오후예요';
  return '좋은 저녁이에요';
}

// ── DATA LOADING ──
function loadAll() {
  onSnapshot(query(collection(db,'requests'), orderBy('createdAt','desc')), snap => {
    const all = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderHome(all);
    renderMyTab(all, null, null);
  });
  onSnapshot(query(collection(db,'places'), orderBy('createdAt','desc')), snap => {
    const all = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderPlaces(all);
  });
  onSnapshot(query(collection(db,'diaries'), orderBy('date','desc')), snap => {
    const all = snap.docs.map(d => ({id:d.id,...d.data()}));
    window._diaries = all;
    document.getElementById('stat-diary').textContent = all.length;
    if (currentMyTab === 'diaries') renderMyTabDiaries(all);
  });
}

// ── RENDER HOME ──
function renderHome(requests) {
  const pending  = requests.filter(r => r.status === '대기');
  const accepted = requests.filter(r => r.status === '수락');
  document.getElementById('stat-pending').textContent = pending.length;
  document.getElementById('stat-total').textContent = accepted.length;

  // 받은 신청 (나에게 온 것)
  const incoming = pending.filter(r => r.toUser === currentNickname);
  const inEl = document.getElementById('home-incoming');
  inEl.innerHTML = incoming.length ? incoming.map(r => reqCardHTML(r, true)).join('') :
    `<div class="empty-state">아직 받은 신청이 없어요</div>`;

  // 다가오는 데이트
  const today = new Date().toISOString().split('T')[0];
  const upcoming = accepted.filter(r => r.date >= today).sort((a,b)=>a.date.localeCompare(b.date));
  const upEl = document.getElementById('home-upcoming');
  upEl.innerHTML = upcoming.length ? upcoming.map(r => upcomingCardHTML(r)).join('') :
    `<div class="empty-state">예정된 데이트가 없어요</div>`;
}

function reqCardHTML(r, showActions) {
  return `<div class="req-card">
    <div class="req-from">${r.fromUser} → ${r.toUser}</div>
    <div class="req-date-big">${r.date} ${r.time}</div>
    <div class="req-info">${r.theme} · ${r.region}${r.subLocation?' / '+r.subLocation:''}</div>
    ${r.message ? `<div style="font-size:13px;color:var(--text2);font-style:italic;margin-bottom:10px;">"${r.message}"</div>` : ''}
    ${r.mission ? `<div style="font-size:13px;background:var(--peach);padding:8px 12px;border-radius:10px;margin-bottom:10px;">미션: ${r.mission}</div>` : ''}
    ${showActions ? `<div class="req-actions">
      <button class="btn btn-rose btn-sm" onclick="respondRequest('${r.id}','수락')">수락</button>
      <button class="btn btn-outline btn-sm" onclick="respondRequest('${r.id}','거절')">거절</button>
    </div>` : `<span class="status-badge ${r.status==='수락'?'s-accepted':r.status==='거절'?'s-rejected':'s-pending'}">${r.status}</span>`}
  </div>`;
}

function upcomingCardHTML(r) {
  const checkHTML = r.checklist?.length ? r.checklist.map((c,i) => `
    <div class="checklist-mini-item" onclick="toggleCheck('${r.id}',${i})">
      <div class="mini-check ${c.done?'done'}">${c.done?'✓':''}</div>
      <span class="mini-text ${c.done?'done':''}">${c.important?'<span class="important-star">★</span> ':''}${c.text}</span>
    </div>`).join('') : '';
  return `<div class="date-card">
    <div class="date-card-top">
      <div>
        <div class="date-card-date">${r.date} ${r.time}</div>
        <div class="date-card-info">${r.theme} · ${r.region}${r.subLocation?' / '+r.subLocation:''}</div>
      </div>
      <span class="status-badge s-accepted">확정</span>
    </div>
    ${checkHTML ? `<div class="checklist-mini">${checkHTML}</div>` : ''}
  </div>`;
}

// ── MY TAB ──
window._allRequests = [];
window.switchMyTab = (tab, el) => {
  currentMyTab = tab;
  document.querySelectorAll('#page-my .tab-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  renderMyTab(window._allRequests, window._allPlaces, window._diaries);
};

onSnapshot(query(collection(db,'requests'),orderBy('createdAt','desc')), snap => {
  window._allRequests = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMyTab(window._allRequests, window._allPlaces, window._diaries);
});

function renderMyTab(requests, places, diaries) {
  if (!requests) return;
  window._allRequests = requests;
  const el = document.getElementById('my-tab-content');

  if (currentMyTab === 'received') {
    const mine = requests.filter(r => r.toUser === currentNickname);
    el.innerHTML = mine.length ? mine.map(r => reqCardHTML(r, r.status==='대기')).join('') :
      `<div class="empty-state">받은 신청이 없어요</div>`;
  } else if (currentMyTab === 'sent') {
    const mine = requests.filter(r => r.fromUser === currentNickname);
    el.innerHTML = mine.length ? mine.map(r => reqCardHTML(r, false)).join('') :
      `<div class="empty-state">보낸 신청이 없어요</div>`;
  } else if (currentMyTab === 'dates') {
    const accepted = requests.filter(r => r.status === '수락').sort((a,b)=>b.date.localeCompare(a.date));
    el.innerHTML = accepted.length ? accepted.map(r => {
      const d = (window._diaries||[]).find(d=>d.reqId===r.id);
      const checkHTML = r.checklist?.length ? r.checklist.map((c,i)=>`
        <div class="checklist-mini-item" onclick="toggleCheck('${r.id}',${i})">
          <div class="mini-check ${c.done?'done'}">${c.done?'✓':''}</div>
          <span class="mini-text ${c.done?'done':''}">${c.important?'<span class="important-star">★</span> ':''}${c.text}</span>
        </div>`).join('') : '';
      return `<div class="date-card">
        <div class="date-card-top">
          <div>
            <div class="date-card-date">${r.date} ${r.time}</div>
            <div class="date-card-info">${r.theme} · ${r.region}${r.subLocation?' / '+r.subLocation:''}</div>
          </div>
        </div>
        ${checkHTML ? `<div class="checklist-mini">${checkHTML}</div>` : ''}
        ${d ? `<div style="background:var(--rose4);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--text2);">일기: ${d.title}</div>` :
          `<button class="btn btn-outline btn-sm btn-full" onclick="openDiaryModal('${r.id}','${r.date}')" style="margin-top:8px;">일기 쓰기</button>`}
      </div>`;
    }).join('') : `<div class="empty-state">데이트 기록이 없어요</div>`;
  } else if (currentMyTab === 'diaries') {
    renderMyTabDiaries(window._diaries||[]);
  }
}

function renderMyTabDiaries(diaries) {
  const el = document.getElementById('my-tab-content');
  el.innerHTML = diaries.length ? diaries.map(d => `
    <div class="diary-card">
      <div class="diary-date-label">${d.date}</div>
      <div class="diary-title">${d.title}</div>
      <div class="diary-body">${d.content}</div>
      <div class="diary-stars">${'★'.repeat(d.star||5)}${'☆'.repeat(5-(d.star||5))}</div>
      ${d.tags?.length ? `<div class="diary-tags">${d.tags.map(t=>`<span class="diary-tag">#${t.trim()}</span>`).join('')}</div>` : ''}
    </div>`).join('') : `<div class="empty-state">아직 일기가 없어요</div>`;
}

// ── RENDER PLACES ──
function renderPlaces(places) {
  window._allPlaces = places;
  const regionCount = {};
  places.filter(p=>p.category==='visited').forEach(p => {
    const key = p.region?.split(' ')[0] || p.region;
    regionCount[key] = (regionCount[key]||0)+1;
  });
  const maxC = Math.max(1,...Object.values(regionCount));
  const statsEl = document.getElementById('region-stats-list');
  statsEl.innerHTML = Object.keys(regionCount).length ? Object.entries(regionCount).sort((a,b)=>b[1]-a[1]).map(([r,c])=>`
    <div style="display:flex;align-items:center;gap:12px;background:white;border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow2);">
      <div style="font-size:14px;font-weight:700;min-width:60px;">${r}</div>
      <div style="flex:1;height:6px;background:var(--rose3);border-radius:3px;overflow:hidden;">
        <div style="width:${c/maxC*100}%;height:100%;background:var(--rose);border-radius:3px;transition:width 0.6s;"></div>
      </div>
      <div style="font-family:'Nanum Myeongjo',serif;font-size:18px;font-weight:800;color:var(--rose);min-width:24px;text-align:right;">${c}</div>
    </div>`).join('') : `<div class="empty-state">아직 기록이 없어요</div>`;

  const listEl = document.getElementById('places-list');
  const filtered = places.filter(p=>p.category===currentPlaceFilter);
  listEl.innerHTML = filtered.length ? filtered.map(p=>`
    <div class="place-item">
      <div class="place-dot"></div>
      <div style="flex:1;">
        <div class="place-name-big">${p.name}</div>
        <div class="place-region-label">${p.region}${p.memo?' · '+p.memo:''}</div>
      </div>
      <button onclick="deletePlace('${p.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;">삭제</button>
    </div>`).join('') : `<div class="empty-state">저장된 장소가 없어요</div>`;
}

window.filterPlaces = (tab, el) => {
  currentPlaceFilter = tab;
  document.querySelectorAll('#page-places .tab-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  renderPlaces(window._allPlaces||[]);
};

// ── ACTIONS ──
window.selectRecipient = (nick) => {
  selectedRecipient = nick;
  document.getElementById('r-woonyo').classList.toggle('selected', nick==='woonyo');
  document.getElementById('r-oldman').classList.toggle('selected', nick==='old man');
};
window.selectTheme = (el) => {
  document.querySelectorAll('.theme-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected'); selectedTheme = el.dataset.theme;
};
window.addCheckItem = () => {
  const input = document.getElementById('new-check-input');
  const text = input.value.trim(); if (!text) return;
  if (checklistItems.length >= 10) { showToast('최대 10개까지 가능해요', true); return; }
  checklistItems.push({text, important:false, done:false});
  input.value = ''; renderChecklistItems();
};
function renderChecklistItems() {
  const starCount = checklistItems.filter(c=>c.important).length;
  document.getElementById('checklist-items').innerHTML = checklistItems.map((c,i)=>`
    <div class="checklist-item">
      <span class="check-text ${c.important?'important':''}">${c.text}</span>
      ${c.important?'<span style="font-size:12px;background:var(--rose3);color:var(--rose);padding:2px 8px;border-radius:6px;font-weight:700;">중요</span>':''}
      <button class="star-btn ${c.important?'on':''}" onclick="toggleImportant(${i})">★</button>
      <button class="del-btn" onclick="removeCheck(${i})">×</button>
    </div>`).join('');
}
window.toggleImportant = (idx) => {
  const cnt = checklistItems.filter(c=>c.important).length;
  if (!checklistItems[idx].important && cnt >= 3) { showToast('중요 표시는 최대 3개까지', true); return; }
  checklistItems[idx].important = !checklistItems[idx].important; renderChecklistItems();
};
window.removeCheck = (idx) => { checklistItems.splice(idx,1); renderChecklistItems(); };

window.drawMission = () => {
  const m = MISSIONS[Math.floor(Math.random()*MISSIONS.length)];
  document.getElementById('mission-display').innerHTML =
    `<div class="mission-box"><div class="mission-box-text">${m}</div></div>`;
  document.getElementById('mission-display').dataset.mission = m;
};

window.submitDateRequest = async () => {
  const date = document.getElementById('a-date').value;
  const time = document.getElementById('a-time').value;
  const recipient = document.getElementById('a-recipient').value.trim();
  if (!recipient) { showToast('받는 사람 닉네임을 입력해주세요', true); return; }
  if (recipient === currentNickname) { showToast('자신에게는 신청할 수 없어요', true); return; }
  if (!date || !selectedTheme || !selectedRegion) { showToast('날짜, 테마, 지역을 모두 선택해주세요', true); return; }
  await addDoc(collection(db,'requests'), {
    fromUser: currentNickname,
    toUser: recipient,
    date, time,
    theme: selectedTheme,
    region: selectedRegion,
    subLocation: document.getElementById('a-subloc').value,
    checklist: checklistItems.map(c=>({...c})),
    mission: document.getElementById('mission-display').dataset?.mission||'',
    message: document.getElementById('a-message').value,
    status: '대기',
    createdAt: serverTimestamp()
  });
  showToast('신청을 보냈어요!');
  checklistItems=[]; renderChecklistItems(); selectedTheme=''; selectedRegion='';
  document.querySelectorAll('.theme-chip').forEach(c=>c.classList.remove('selected'));
  document.getElementById('region-btn-text').textContent='지역을 선택하세요';
  document.getElementById('a-recipient').value='';
  document.getElementById('a-subloc').value=''; document.getElementById('a-message').value='';
  document.getElementById('mission-display').innerHTML='';
  showPage('home', document.querySelector('.nav-item'));
};

window.respondRequest = async (id, status) => {
  await updateDoc(doc(db,'requests',id), {status});
  showToast(status==='수락'?'수락했어요!':'거절했어요');
};

window.toggleCheck = async (reqId, idx) => {
  const all = window._allRequests||[];
  const r = all.find(x=>x.id===reqId); if(!r) return;
  const cl = [...(r.checklist||[])];
  cl[idx] = {...cl[idx], done: !cl[idx].done};
  await updateDoc(doc(db,'requests',reqId),{checklist:cl});
};

window.saveSublocAsPlace = async () => {
  const name = document.getElementById('a-subloc').value.trim();
  if (!name || !selectedRegion) { showToast('지역과 세부 장소를 먼저 입력해주세요', true); return; }
  await addDoc(collection(db,'places'),{name, region:selectedRegion, memo:'', category:'visited', createdAt:serverTimestamp()});
  showToast('장소가 저장됐어요!');
};

window.savePlace = async () => {
  const name = document.getElementById('p-name').value.trim();
  if (!name || !selectedPlaceRegion) { showToast('지역과 장소명을 입력해주세요', true); return; }
  await addDoc(collection(db,'places'),{
    name, region:selectedPlaceRegion,
    memo:document.getElementById('p-memo').value,
    category:document.getElementById('p-cat').value,
    createdAt:serverTimestamp()
  });
  closeModal('modal-place');
  document.getElementById('p-name').value=''; document.getElementById('p-memo').value='';
  selectedPlaceRegion=''; document.getElementById('place-region-btn-text').textContent='지역을 선택하세요';
  showToast('장소가 저장됐어요!');
};

window.deletePlace = async (id) => {
  if(!confirm('삭제할까요?')) return;
  await deleteDoc(doc(db,'places',id)); showToast('삭제됐어요');
};

window.openDiaryModal = (reqId, date) => {
  document.getElementById('d-req-id').value = reqId;
  document.getElementById('d-title').value = '';
  document.getElementById('d-content').value = '';
  document.getElementById('d-tags').value = '';
  diaryStar=5; updateDiaryStars();
  openModal('modal-diary');
};

window.saveDiary = async () => {
  const title = document.getElementById('d-title').value.trim();
  const content = document.getElementById('d-content').value.trim();
  const reqId = document.getElementById('d-req-id').value;
  if (!title||!content) { showToast('제목과 내용을 입력해주세요', true); return; }
  const req = (window._allRequests||[]).find(r=>r.id===reqId);
  await addDoc(collection(db,'diaries'),{
    reqId, title, content,
    date: req?.date || new Date().toISOString().split('T')[0],
    star: diaryStar,
    tags: document.getElementById('d-tags').value.split(',').filter(t=>t.trim()),
    author: currentNickname,
    createdAt: serverTimestamp()
  });
  closeModal('modal-diary'); showToast('일기가 저장됐어요!');
  switchMyTab('dates', null);
};

window.setDiaryStar = (n) => { diaryStar=n; updateDiaryStars(); };
function updateDiaryStars() {
  const spans = document.querySelectorAll('#diary-stars span');
  spans.forEach((s,i) => { s.textContent = i<diaryStar?'★':'☆'; });
}

// ── UI ──
window.showPage = (id, el) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el) el.classList.add('active');
};
window.openModal = (id) => document.getElementById(id).classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');
window.showToast = (msg, isErr=false) => {
  const t = document.getElementById('toast');
  t.textContent=msg; t.style.background=isErr?'#C0392B':'#3D2C2C';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
};

document.getElementById('a-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
